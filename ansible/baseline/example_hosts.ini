# example_hosts.ini
#
# A STATIC inventory in INI format. This is the simplest way to understand
# Ansible's grouping model before moving to the dynamic Proxmox inventory.
#
# Format: [group_name] then one host per line. host_var=value sets per-host
# variables; [group:vars] sets variables for the whole group.
#
# Copy to hosts.ini and edit, OR ignore this entirely and use the dynamic
# homelab.proxmox.yml, which pulls the same data live from the Proxmox API.

[services]
docker  ansible_host=192.168.1.110
media   ansible_host=192.168.1.111

[tailscale]
docker
media

# Group of groups: "all_guests" contains every host in services.
[all_guests:children]
services

[all_guests:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3

