# ansible.cfg
#
# Ansible reads this from the current directory automatically. It sets sane
# defaults so commands stay short.

[defaults]
# Where to find hosts. We point at a dynamic inventory file (see baseline/).
inventory = baseline/homelab.proxmox.yml

# The user cloud-init created (matches ci_user in Terraform).
remote_user = ansible

# Don't choke on first-connect host key prompts in a homelab. In production
# you'd manage known_hosts properly instead.
host_key_checking = False

# Make output readable.
stdout_callback = yaml
interpreter_python = auto_silent

# Roles/collections discovery.
roles_path = baseline:baseline/services

[privilege_escalation]
# Most tasks need root inside the guest; cloud-init user has passwordless sudo.
become = True
become_method = sudo

